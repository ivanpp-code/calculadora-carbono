<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Emissão de CO₂</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <h1 class="header__title">📟 Calculadora de Emissão de CO₂ 🌳</h1>
        <p class="header__subtitle">Calcule e compare a emissão de dióxido de carbono de diferentes meios de transporte</p>
    </header>

    <main class="main">
        <form id="calculator-form" class="form">
            <div class="form__group">
                <label for="origin" class="form__label">Origem:</label>
                <input 
                    type="text" 
                    id="origin" 
                    class="form__input" 
                    list="cities-list"
                    placeholder="Digite a cidade de origem"
                    required
                >
                <datalist id="cities-list"></datalist>
            </div>

            <div class="form__group">
                <label for="destination" class="form__label">Destino:</label>
                <input 
                    type="text" 
                    id="destination" 
                    class="form__input" 
                    list="cities-list"
                    placeholder="Digite a cidade de destino"
                    required
                >
            </div>

            <div class="form__group">
                <label class="form__label">Meio de Transporte:</label>
                <div class="form__transport-grid">
                    <label class="form__transport-option">
                        <input type="radio" name="transport" value="bicycle" class="form__radio" required>
                        <span class="form__transport-label">🚴 Bicicleta</span>
                    </label>
                    <label class="form__transport-option">
                        <input type="radio" name="transport" value="motorcycle" class="form__radio" required>
                        <span class="form__transport-label">🏍️ Motocicleta</span>
                    </label>
                    <label class="form__transport-option">
                        <input type="radio" name="transport" value="car" class="form__radio" required>
                        <span class="form__transport-label">🚗 Carro</span>
                    </label>
                    <label class="form__transport-option">
                        <input type="radio" name="transport" value="bus" class="form__radio" required>
                        <span class="form__transport-label">🚌 Ônibus</span>
                    </label>
                </div>
            </div>

            <div class="form__group form__group--row">
                <label for="distance" class="form__label">Distância:</label>
                <div class="form__row-grid">
                    <input 
                        type="number" 
                        id="distance" 
                        class="form__input" 
                        placeholder="km"
                        readonly
                    >

                    <button type="submit" class="form__button">Comparar Emissão</button>
                    <button type="button" id="reset-button" class="form__button form__button--secondary">Reiniciar</button>
                </div>
                <p class="form__helper-text">A distância será preenchida automaticamente</p>
            </div>
        </form>

        <section id="results" class="results hidden">
            <div id="results-content" class="results__content"></div>
        </section>

        <section id="comparison" class="comparison hidden">
            <div id="comparison-content" class="comparison__content"></div>
        </section>
    </main>

    <footer class="footer">
        <p class="footer__text">Desenvolvido por Ivan - Jun 26</p>
    </footer>

    <script src="js/routes-data.js"></script>
    <script src="js/config.js"></script>
    <script src="js/calculator.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
